<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Twisting Slash: Elemental Tree</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header id="top-bar">
            <div class="stat"><span class="label">OURO:</span> <span id="val-gold">0</span></div>
            <div class="stat"><span class="label">NÍVEL:</span> <span id="val-level">1</span></div>
            <div id="xp-container">
                <div id="xp-bar"><div id="xp-fill"></div></div>
                <span id="xp-text">0 / 100</span>
            </div>
        </header>

        <main id="game-content">
            <section id="main-viewport">
                <canvas id="canvas-battle"></canvas>
                <div id="synergy-overlay"></div>
            </section>

            <aside id="side-panel">
                <div class="panel-tabs">
                    <button class="tab-btn active" data-target="upgrades">UPGRADES</button>
                    <button class="tab-btn" data-target="skills">SKILLS</button>
                </div>

                <div id="upgrades" class="tab-content active">
                    <div class="upgrade-item">
                        <span>Dano: <b id="upg-dmg-val">10</b></span>
                        <button id="btn-upg-dmg">UP (<span id="cost-dmg">10</span>)</button>
                    </div>
                    <div class="upgrade-item">
                        <span>Inimigos Máx: <b id="upg-max-val">1</b></span>
                        <button id="btn-upg-max">UP (<span id="cost-max">50</span>)</button>
                    </div>
                    <button id="btn-respec" class="danger-btn">REINICIAR SKILLS</button>
                </div>

                <div id="skills" class="tab-content">
                    <div id="skill-tree-root"></div>
                </div>
            </aside>
        </main>
    </div>

    <div id="modal-offline" class="modal hidden">
        <div class="modal-box">
            <h2>BEM-VINDO DE VOLTA</h2>
            <p id="offline-report"></p>
            <button id="btn-claim-offline">COLETAR</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
