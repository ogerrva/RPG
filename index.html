<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050508">
    <title>Twisting Slash: Elemental</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <canvas id="bg-canvas"></canvas>
        <canvas id="game-canvas"></canvas>
        <canvas id="fx-canvas"></canvas>

        <header id="hud-top">
            <div class="stat-group gold">
                <span class="icon">💰</span>
                <span id="val-gold">0</span>
            </div>
            <div class="stat-group level">
                <span id="val-level">NV. 1</span>
                <div class="xp-bar-container">
                    <div id="xp-fill"></div>
                </div>
            </div>
            <div class="stat-group essence">
                <span class="icon">✨</span>
                <span id="val-essence">0</span>
            </div>
        </header>

        <div id="mana-container">
            <div id="mana-fill"></div>
            <span id="mana-text">100/100</span>
        </div>

        <nav id="main-nav">
            <button onclick="UI.toggleTab('upgrades')" class="nav-btn">🛠️ <small>Atributos</small></button>
            <button onclick="UI.toggleTab('skills')" class="nav-btn">🔥 <small>Habilidades</small></button>
            <button onclick="UI.toggleTab('prestige')" class="nav-btn">🏆 <small>Ascensão</small></button>
            <button id="pwa-install" class="nav-btn hidden">📲 <small>Instalar</small></button>
        </nav>

        <section id="ui-panels">
            <div id="tab-upgrades" class="panel hidden">
                <div class="panel-header">
                    <h3>Atributos do Herói</h3>
                    <button onclick="UI.closeAll()">×</button>
                </div>
                <div class="scroll-area" id="list-upgrades">
                    </div>
            </div>

            <div id="tab-skills" class="panel hidden">
                <div class="panel-header">
                    <h3>Domínio Elemental</h3>
                    <button onclick="UI.closeAll()">×</button>
                </div>
                <div class="scroll-area" id="list-skills">
                    </div>
            </div>
        </section>

        <div id="idle-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Bem-vindo de volta!</h2>
                <p>Enquanto você estava fora, seus heróis lutaram bravamente.</p>
                <div class="idle-stats">
                    <div>Ganhos: <span id="idle-gold" class="gold-text">0</span> 💰</div>
                    <div>Experiência: <span id="idle-xp" class="xp-text">0</span> ✨</div>
                </div>
                <button onclick="Game.claimIdle()">Coletar Recompensas</button>
            </div>
        </div>
    </div>

    <script src="game.js" defer></script>
</body>
</html>
